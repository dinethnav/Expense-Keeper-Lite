<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Expense Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; }

    .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 28px; }
    .brand-icon { font-size: 1.6rem; }
    .brand-name { font-size: 1.2rem; font-weight: 800; color: #1a1a2e; letter-spacing: -0.4px; }

    .card { background: #fff; border-radius: 18px; padding: 32px 28px 28px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.09); }

    h1 { font-size: 1.35rem; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; letter-spacing: -0.3px; }
    .subtitle { font-size: 0.85rem; color: #999; margin-bottom: 24px; }

    .field { margin-bottom: 14px; }
    label { display: block; font-size: 0.72rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; border: 1.5px solid #e4e4e4; border-radius: 9px;
      padding: 10px 13px; font-size: 0.95rem; outline: none;
      background: #fafafa; color: #1a1a2e;
      transition: border-color 0.15s, background 0.15s;
    }
    input:focus { border-color: #5b6af5; background: #fff; }

    .btn-primary {
      width: 100%; margin-top: 6px; background: #5b6af5; color: #fff;
      border: none; border-radius: 9px; padding: 11px 18px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s, transform 0.1s; letter-spacing: -0.1px;
    }
    .btn-primary:hover { background: #4a57e0; }
    .btn-primary:active { transform: scale(0.98); }

    .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; }
    .divider-line { flex: 1; height: 1px; background: #efefef; }
    .divider-text { font-size: 0.78rem; color: #ccc; font-weight: 500; }

    .btn-google {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      border: 1.5px solid #e4e4e4; background: #fff; border-radius: 9px;
      padding: 10px 18px; font-size: 0.92rem; font-weight: 600; color: #333;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      text-decoration: none;
    }
    .btn-google:hover { border-color: #aaa; background: #fafafa; }
    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

    .error-box {
      background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px;
      padding: 10px 13px; color: #e53935; font-size: 0.84rem; margin-bottom: 16px;
      display: none;
    }
    .error-box.visible { display: block; }

    .footer-link { margin-top: 22px; text-align: center; font-size: 0.85rem; color: #999; }
    .footer-link a { color: #5b6af5; text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="brand">
  <span class="brand-icon">💰</span>
  <span class="brand-name">Expenses</span>
</div>

<div class="card">
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your account</p>

  <div class="error-box" id="error-box"></div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
    </div>
    <button type="submit" class="btn-primary" id="submit-btn">Sign in</button>
  </form>

  <div id="google-section" style="display:none;">
    <div class="divider"><div class="divider-line"></div><span class="divider-text">or</span><div class="divider-line"></div></div>
    <a href="/auth/google" class="btn-google">
      <svg class="google-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>
  </div>
</div>

<div class="footer-link">Don't have an account? <a href="/signup">Sign up</a></div>

<script>
  // Show Google button if enabled
  fetch('/auth/google-enabled').then(r => r.json()).then(d => {
    if (d.enabled) document.getElementById('google-section').style.display = 'block';
  });

  // Check for error in URL
  const params = new URLSearchParams(location.search);
  if (params.get('error')) {
    const msgs = {
      'invalid': 'Invalid email or password.',
      'disabled': 'Your account has been disabled. Contact an admin.',
      'google_error': 'Google sign-in failed. Please try again.',
    };
    showError(msgs[params.get('error')] || 'An error occurred.');
  }
  if (params.get('msg') === 'registered') {
    const box = document.getElementById('error-box');
    box.style.background = '#f0fdf4';
    box.style.borderColor = '#86efac';
    box.style.color = '#059669';
    box.textContent = 'Account created! Sign in below.';
    box.classList.add('visible');
  }

  function showError(msg) {
    const b = document.getElementById('error-box');
    b.textContent = msg;
    b.classList.add('visible');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Signing in…'; btn.disabled = true;
    document.getElementById('error-box').classList.remove('visible');

    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      }),
    });

    if (res.ok) {
      window.location.href = '/';
    } else {
      const d = await res.json().catch(() => ({}));
      showError(d.detail || 'Invalid email or password.');
      btn.textContent = 'Sign in'; btn.disabled = false;
    }
  }
</script>
</body>
</html>
